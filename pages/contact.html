<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contattaci</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen">

  <!-- HEADER -->
  <header class="bg-gray-950/70 backdrop-blur-md border-b border-gray-700 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
      
      <h1 class="text-lg md:text-xl font-bold text-blue-400">
        FormexaLab3D
      </h1>

      <!-- Bottone Hamburger -->
      <button class="menu-toggle text-3xl md:hidden">
        ☰
      </button>

      <!-- Menu Desktop -->
      <nav class="hidden md:flex gap-6 font-semibold">
        <a href="index.html" class="hover:text-blue-400 transition">Home</a>
        <a href="about.html" class="hover:text-blue-400 transition">About us</a>
        <a href="contact.html" class="hover:text-blue-400 transition">Contatti</a>
      </nav>
    </div>

    <!-- Menu Mobile -->
    <nav class="nav-menu hidden flex flex-col gap-3 px-4 pb-4 font-semibold md:hidden">
      <a href="index.html" class="hover:text-blue-400 transition">Home</a>
      <a href="about.html" class="hover:text-blue-400 transition">About us</a>
      <a href="contact.html" class="hover:text-blue-400 transition">Contatti</a>
    </nav>
  </header>


  <!-- MAIN -->
  <main class="max-w-4xl mx-auto p-6">

    <section class="text-center mb-10">
      <h2 class="text-3xl font-bold text-purple-400 mb-2">Contattaci</h2>
      <p class="text-gray-300">
        Compila il modulo qui sotto e ti risponderemo il prima possibile.
      </p>
    </section>

    <!-- FORM -->
    <section class="bg-gray-900/70 border border-gray-700 rounded-2xl p-8 shadow-lg">

      <form class="flex flex-col gap-6" action="https://formspree.io/f/mvzlglvy"
  method="POST">
       

        <!-- EMAIL -->
        <div>
          <label for="email" class="block mb-2 font-semibold text-gray-200">
            Email
          </label>
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="Inserisci la tua email"
            required
            class="w-full p-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-blue-400"
          >
        </div>

        <!-- TEXTAREA -->
        <div>
          <label for="message" class="block mb-2 font-semibold text-gray-200">
            Come possiamo aiutarti?
          </label>
          <textarea 
            id="message" 
            name="message"
            rows="6"
            placeholder="Scrivi il tuo messaggio..."
            required
            class="w-full p-3 rounded-xl bg-gray-800 border border-gray-600 text-white focus:outline-none focus:border-purple-400"
          ></textarea>
        </div>

        <!-- BUTTON -->
        <button 
          type="submit"
          class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition"
        >
          Invia Messaggio
        </button>

      </form>

    </section>

  </main>


  <!-- FOOTER -->
  <footer class="text-center text-gray-400 py-6 border-t border-gray-700 mt-10">
    <p>&copy; 2026 FormexaLab3D. Tutti i diritti riservati.</p>
  </footer>


  <!-- SCRIPT MENU -->
  <script>
    const toggleButton = document.querySelector(".menu-toggle");
    const navMenu = document.querySelector(".nav-menu");

    toggleButton.addEventListener("click", () => {
      navMenu.classList.toggle("hidden");
    });
  </script>

</body>
</html>
